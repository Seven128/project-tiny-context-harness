# pjsdlc:sdlc-harness:github-workflow:begin
name: Harness Gates

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      gate:
        description: "Make target to run"
        required: true
        default: "validate-harness"
        type: choice
        options:
          - validate-harness
          - validate-work-products-overviews
          - validate-current
          - validate-pm
          - validate-design
          - validate-dev
          - validate-review
          - validate-test
          - validate-release
          - validate-rfc

jobs:
  harness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - name: Install package dependencies
        run: npm install
      - name: Test sdlc-harness package
        run: npm test --workspace agent-project-sdlc
      - name: Check package canonical source drift
        run: npm --workspace agent-project-sdlc exec -- sdlc-harness package check-source
      - name: Run harness gate
        run: make "${HARNESS_GATE}"
        env:
          HARNESS_GATE: ${{ github.event.inputs.gate || 'validate-harness' }}
# pjsdlc:sdlc-harness:github-workflow:end
