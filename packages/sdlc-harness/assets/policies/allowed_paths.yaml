global:
  never_edit_without_confirmation:
    - ".git/**"
    - ".env"
    - ".env.*"
    - "secrets/**"
    - "production/**"

phases:
  REQUIREMENT_GATHERING:
    write:
      - ".work_products/00_raw/**"
      - ".work_products/01_product/**"
      - ".work_products/INDEX.md"

  UI_UX_DESIGNING:
    write:
      - ".work_products/02_experience/**"
      - "DESIGN.md"
      - "<harnessRoot>/state/plan.yaml"
      - ".work_products/INDEX.md"

  ARCHITECTING:
    write:
      - ".work_products/02_architecture/**"
      - ".work_products/03_tech_plan/**"
      - ".work_products/05_decisions/**"
      - "<harnessRoot>/state/plan.draft.yaml"
      - ".work_products/INDEX.md"

  SPRINTING:
    write_from_task_allowed_paths: true
    always_allow:
      - ".work_products/04_implementation/**"
      - ".work_products/INDEX.md"
      - "<harnessRoot>/state/plan.yaml"
      - "<harnessRoot>/state/plan.draft.yaml"

  REVIEWING:
    read_only_source: true
    write:
      - "<harnessRoot>/state/plan.yaml"
      - ".work_products/06_review/**"
      - ".work_products/INDEX.md"

  TESTING:
    write:
      - "<harnessRoot>/state/plan.yaml"
      - ".work_products/07_test/**"
      - "tests/**"
      - ".work_products/INDEX.md"

  RELEASING:
    write:
      - "<harnessRoot>/state/plan.yaml"
      - ".work_products/08_release/**"
      - ".work_products/INDEX.md"

  RFC_RECALIBRATION:
    write:
      - ".work_products/rfc/**"
      - ".work_products/01_product/**"
      - ".work_products/02_experience/**"
      - "DESIGN.md"
      - ".work_products/03_tech_plan/**"
      - ".work_products/07_test/**"
      - ".work_products/09_runbooks/**"
      - "<harnessRoot>/state/plan.yaml"
      - ".work_products/INDEX.md"
