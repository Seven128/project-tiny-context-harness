global:
  never_edit_without_confirmation:
    - ".git/**"
    - ".env"
    - ".env.*"
    - "secrets/**"
    - "production/**"

phases:
  REQUIREMENT_GATHERING:
    write:
      - ".docs/00_raw/**"
      - ".docs/01_product/**"
      - ".docs/INDEX.md"

  UI_UX_DESIGNING:
    write:
      - ".docs/02_experience/**"
      - "DESIGN.md"
      - "<harnessRoot>/state/plan.yaml"
      - ".docs/INDEX.md"

  ARCHITECTING:
    write:
      - ".docs/02_architecture/**"
      - ".docs/03_tech_plan/**"
      - ".docs/05_decisions/**"
      - "<harnessRoot>/state/plan.draft.yaml"
      - ".docs/INDEX.md"

  SPRINTING:
    write_from_task_allowed_paths: true
    always_allow:
      - ".docs/04_implementation/**"
      - ".docs/INDEX.md"
      - "<harnessRoot>/state/plan.yaml"
      - "<harnessRoot>/state/plan.draft.yaml"

  REVIEWING:
    read_only_source: true
    write:
      - "<harnessRoot>/state/plan.yaml"
      - ".docs/06_review/**"
      - ".docs/INDEX.md"

  TESTING:
    write:
      - "<harnessRoot>/state/plan.yaml"
      - ".docs/07_test/**"
      - "tests/**"
      - ".docs/INDEX.md"

  RELEASING:
    write:
      - "<harnessRoot>/state/plan.yaml"
      - ".docs/08_release/**"
      - ".docs/INDEX.md"

  RFC_RECALIBRATION:
    write:
      - ".docs/rfc/**"
      - ".docs/01_product/**"
      - ".docs/02_experience/**"
      - "DESIGN.md"
      - ".docs/03_tech_plan/**"
      - ".docs/07_test/**"
      - ".docs/09_runbooks/**"
      - "<harnessRoot>/state/plan.yaml"
      - ".docs/INDEX.md"
