name: Package CI

on:
  pull_request:
    paths:
      - ".codex/ty-context-managed/**"
      - ".devcontainer/**"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE.md"
      - ".github/workflows/harness.yml"
      - ".github/workflows/npm-publish.yml"
      - ".github/workflows/package.yml"
      - ".github/workflows/scorecard.yml"
      - "CODE_OF_CONDUCT.md"
      - "CONTRIBUTING.md"
      - "docs/launch/**"
      - "examples/minimal-context-sample/**"
      - "GOVERNANCE.md"
      - "LICENSE"
      - "SUPPORT.md"
      - "packages/ty-context/**"
      - "project_context/**"
      - "tests/ty-context/**"
      - "tools/**"
      - "package.json"
      - "package-lock.json"
      - "PROJECT_SPEC.md"
      - "README.md"
  push:
    branches:
      - main
      - "codex/**"
    paths:
      - ".codex/ty-context-managed/**"
      - ".devcontainer/**"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE.md"
      - ".github/workflows/harness.yml"
      - ".github/workflows/npm-publish.yml"
      - ".github/workflows/package.yml"
      - ".github/workflows/scorecard.yml"
      - "CODE_OF_CONDUCT.md"
      - "CONTRIBUTING.md"
      - "docs/launch/**"
      - "examples/minimal-context-sample/**"
      - "GOVERNANCE.md"
      - "LICENSE"
      - "SUPPORT.md"
      - "packages/ty-context/**"
      - "project_context/**"
      - "tests/ty-context/**"
      - "tools/**"
      - "package.json"
      - "package-lock.json"
      - "PROJECT_SPEC.md"
      - "README.md"
  workflow_dispatch:

jobs:
  package:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["24"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Build package
        run: npm run build --workspace project-tiny-context-harness
      - name: Check package canonical source drift
        run: node packages/ty-context/dist/cli.js package check-source
      - name: Validate source Context
        run: make validate-context
