name: Package CI

on:
  pull_request:
    paths:
      - ".codex/config.yaml"
      - ".codex/hooks.json"
      - ".codex/skills/**"
      - ".codex/ty-context-managed/**"
      - ".devcontainer/**"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE.md"
      - ".github/workflows/harness.yml"
      - ".github/workflows/npm-publish.yml"
      - ".github/workflows/package.yml"
      - ".github/workflows/scorecard.yml"
      - "CODE_OF_CONDUCT.md"
      - "CONTRIBUTING.md"
      - "docs/launch/**"
      - "examples/minimal-context-sample/**"
      - "GOVERNANCE.md"
      - "LICENSE"
      - "SUPPORT.md"
      - "AGENTS.md"
      - "Makefile"
      - "packages/ty-context/**"
      - "project_context/**"
      - "tests/ty-context/**"
      - "tools/**"
      - "package.json"
      - "package-lock.json"
      - "PROJECT_SPEC.md"
      - "README.md"
      - "README.zh-CN.md"
  push:
    branches:
      - main
      - "codex/**"
    paths:
      - ".codex/config.yaml"
      - ".codex/hooks.json"
      - ".codex/skills/**"
      - ".codex/ty-context-managed/**"
      - ".devcontainer/**"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE.md"
      - ".github/workflows/harness.yml"
      - ".github/workflows/npm-publish.yml"
      - ".github/workflows/package.yml"
      - ".github/workflows/scorecard.yml"
      - "CODE_OF_CONDUCT.md"
      - "CONTRIBUTING.md"
      - "docs/launch/**"
      - "examples/minimal-context-sample/**"
      - "GOVERNANCE.md"
      - "LICENSE"
      - "SUPPORT.md"
      - "AGENTS.md"
      - "Makefile"
      - "packages/ty-context/**"
      - "project_context/**"
      - "tests/ty-context/**"
      - "tools/**"
      - "package.json"
      - "package-lock.json"
      - "PROJECT_SPEC.md"
      - "README.md"
      - "README.zh-CN.md"
  workflow_dispatch:

jobs:
  windows-affected-test-launcher:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Verify Windows npm subprocess launch
        run: node --test tests/ty-context/affected-test-portable-command.test.mjs

  pull-request:
    if: ${{ github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref != 'refs/heads/main') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Check TypeScript formatting
        run: npm run format:check
      - name: Typecheck package and build once
        run: npm run build --workspace project-tiny-context-harness
      - name: Trust boundary package tests
        env:
          TY_CONTEXT_TEST_TIMING_DIR: .artifacts/test-timing/pull-request
          TY_CONTEXT_TEST_SUITE_BUDGETS_MS_JSON: '{"default":120000,"long-task-trust":240000,"long-task":600000}'
        run: |
          set -o pipefail
          npm run test:trust:built --workspace project-tiny-context-harness --ignore-scripts 2>&1 | tee package-trust-test.log
      - name: Upload package test diagnostics
        if: failure()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: package-test-diagnostics-pr-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            package-trust-test.log
            tests/ty-context/long-task-source-authority-closure.test.mjs
          if-no-files-found: ignore
          retention-days: 3
      - name: Upload package test timing
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: package-test-timing-pr-${{ github.run_id }}-${{ github.run_attempt }}
          path: .artifacts/test-timing/pull-request/*.json
          if-no-files-found: ignore
          retention-days: 14
      - name: Check package canonical source drift
        run: node packages/ty-context/dist/cli.js package check-source
      - name: Validate Context and touched-source modularity
        run: make validate-harness
      - name: Validate changed-source modularity and waiver lifecycle
        run: node packages/ty-context/dist/cli.js check-modularity --base "origin/${{ github.base_ref }}" --fail-on-warning
      - name: Quickstart smoke
        run: node tools/quickstart_smoke.mjs

  main:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Check TypeScript formatting
        run: npm run format:check
      - name: Build package
        run: npm run build --workspace project-tiny-context-harness
      - name: Validate modularity waiver lifecycle
        run: node packages/ty-context/dist/cli.js check-modularity --config-only --fail-on-warning
      - name: Complete package tests
        env:
          TY_CONTEXT_TEST_TIMING_DIR: .artifacts/test-timing/main
          TY_CONTEXT_TEST_SUITE_BUDGETS_MS_JSON: '{"default":120000,"long-task-trust":240000,"long-task":600000}'
        run: |
          set -o pipefail
          npm test --workspace project-tiny-context-harness --ignore-scripts 2>&1 | tee package-test.log
      - name: Upload package test diagnostics
        if: failure()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: package-test-diagnostics-main-${{ github.run_id }}-${{ github.run_attempt }}
          path: package-test.log
          if-no-files-found: ignore
          retention-days: 3
      - name: Upload package test timing
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: package-test-timing-main-${{ github.run_id }}-${{ github.run_attempt }}
          path: .artifacts/test-timing/main/*.json
          if-no-files-found: ignore
          retention-days: 14
      - name: Check package canonical source drift
        run: node packages/ty-context/dist/cli.js package check-source
      - name: Validate Context and touched-source modularity
        run: make validate-harness
      - name: Quickstart smoke
        run: node tools/quickstart_smoke.mjs
      - name: Pack preview
        run: npm run preview:pack
