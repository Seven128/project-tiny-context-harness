name: npm Trusted Publish

on:
  workflow_dispatch:
    inputs:
      expected_version:
        description: "Must match packages/ty-context/package.json version."
        required: true
        default: "0.4.0"
      dry_run:
        description: "Build, validate, and pack without publishing."
        required: true
        type: boolean
        default: true

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm-publish
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Ensure npm supports trusted publishing
        run: |
          npm install -g npm@latest
          npm --version
          node -e "const v=require('child_process').execFileSync('npm',['--version'],{encoding:'utf8'}).trim().split('.').map(Number); if (v[0] < 11 || (v[0] === 11 && (v[1] < 5 || (v[1] === 5 && v[2] < 1)))) { throw new Error('npm CLI 11.5.1 or later is required for trusted publishing'); }"

      - name: Check package version
        shell: bash
        run: |
          PACKAGE_VERSION="$(node -p "require('./packages/ty-context/package.json').version")"
          if [ "$PACKAGE_VERSION" != "${{ inputs.expected_version }}" ]; then
            echo "Expected ${{ inputs.expected_version }} but package is $PACKAGE_VERSION" >&2
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build --workspace project-tiny-context-harness

      - name: Check release version surfaces
        run: npm run release:check-version

      - name: Check package canonical source drift
        run: node packages/ty-context/dist/cli.js package check-source

      - name: Validate source Context
        run: make validate-context

      - name: Rebuild and verify immutable prepared artifact
        shell: bash
        run: |
          mkdir -p .artifacts/releases/prepared
          npm pack --json --workspace project-tiny-context-harness --pack-destination .artifacts/releases/prepared
          FILENAME="$(node -p "require('./docs/launch/release-artifact-${{ inputs.expected_version }}.json').filename")"
          node tools/verify_prepared_release_artifact.mjs --version "${{ inputs.expected_version }}" --tarball ".artifacts/releases/prepared/$FILENAME"

      - name: Publish package with npm trusted publishing
        if: ${{ !inputs.dry_run }}
        env:
          NPM_CONFIG_PROVENANCE: "true"
        run: |
          FILENAME="$(node -p "require('./docs/launch/release-artifact-${{ inputs.expected_version }}.json').filename")"
          npm publish ".artifacts/releases/prepared/$FILENAME" --access public

      - name: Create or update GitHub Release
        if: ${{ !inputs.dry_run }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: node tools/github_release_publish.mjs --version "${{ inputs.expected_version }}" --target "${{ github.sha }}"
