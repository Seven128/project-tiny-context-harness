name: Temporary Branch Export

on:
  pull_request:

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Apply verified follow-up patch
        run: |
          git apply --index .github/temporary-long-task-efficiency-followups.patch
          rm .github/temporary-long-task-efficiency-followups.patch
          rm .github/workflows/temporary-branch-export.yml
      - name: Verify focused regressions
        run: |
          npm run format:check
          npm run build --workspace project-tiny-context-harness
          node --test --test-concurrency=1 \
            tests/ty-context/affected-test-portable-command.test.mjs \
            tests/ty-context/affected-test-selection.test.mjs \
            tests/ty-context/workflow-test-entrypoints.test.mjs
          node --test --test-concurrency=1 \
            --test-name-pattern="Source Acceptance resolves a Source-backed Global Assertion chain" \
            tests/ty-context/long-task-source-authority-closure.test.mjs
          node packages/ty-context/dist/cli.js package check-source
          python tools/validate_context.py
      - name: Commit final changes
        run: |
          git config user.name "Seven128"
          git config user.email "40226025+Seven128@users.noreply.github.com"
          git add -A
          git commit -m "Fix long-task efficiency follow-up regressions"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
