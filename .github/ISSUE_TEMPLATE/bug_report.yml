name: Bug report
description: Report a reproducible problem with the Harness CLI, managed assets or validation.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the observed behavior and the behavior you expected.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Include the exact command, relevant files and whether this was a new project or an adopted existing project.
      placeholder: |
        1. Run ...
        2. See ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: agent-project-sdlc version
      placeholder: "0.2.38"
    validations:
      required: false
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: "node -v"
    validations:
      required: false
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows
        - macOS
        - Linux
        - Other
    validations:
      required: false
  - type: textarea
    id: output
    attributes:
      label: Relevant output
      description: Paste the shortest useful error output. Remove secrets, tokens and private repository details.
      render: shell
    validations:
      required: false
