# Fixed benchmark Context graph.

[[areas]]
id = "invoice-ops"
root = "src/billing"
context = "project_context/areas/invoice-ops.md"
kind = "service"
default = true

[[areas]]
id = "notifications"
root = "src/notifications"
context = "project_context/areas/notifications.md"
kind = "provider-boundary"
default = false

[[areas]]
id = "admin"
root = "src/admin"
context = "project_context/areas/admin.md"
kind = "protected-surface"
default = false

[[context]]
path = "project_context/areas/invoice-ops/foundation/money.md"
role = "foundation"
read_policy = "on-demand"
triggers = ["money", "rounding", "decimal", "total", "subtotal", "tax"]

[[context]]
path = "project_context/areas/invoice-ops/contracts/invoice-api.md"
role = "contract"
read_policy = "on-demand"
triggers = ["invoice service", "create invoice", "mark paid", "receipt", "payment event", "idempotent"]

[[context]]
path = "project_context/areas/invoice-ops/contracts/invoice-schema.md"
role = "contract"
read_policy = "on-demand"
triggers = ["schema", "region", "jurisdiction", "compatibility", "deprecated alias", "API"]

[[context]]
path = "project_context/areas/invoice-ops/contracts/retry-policy.md"
role = "contract"
read_policy = "on-demand"
triggers = ["retry", "worker", "attempt", "dead letter", "DLQ", "recovery"]

[[context]]
path = "project_context/areas/invoice-ops/verification.md"
role = "verification"
read_policy = "on-demand"
triggers = ["test", "verify", "smoke", "health", "browser", "oracle"]

[[context]]
path = "project_context/areas/invoice-ops/deployment.md"
role = "deployment"
read_policy = "on-demand"
triggers = ["deploy", "health", "readiness", "degraded", "exit code", "runtime"]

[[context]]
path = "project_context/areas/invoice-ops/implementation-index.md"
role = "implementation-index"
read_policy = "on-demand"
triggers = ["entry point", "where", "file", "implementation", "code navigation"]

[[context]]
path = "project_context/areas/invoice-ops/decision-rationale/rounding.md"
role = "decision-rationale"
read_policy = "on-demand"
triggers = ["why rounding", "floating point", "epsilon", "currency precision"]

[[context]]
path = "project_context/areas/invoice-ops/archive/legacy-tax.md"
role = "archive"
read_policy = "on-demand"
triggers = ["legacy tax v0", "historical tax experiment"]
