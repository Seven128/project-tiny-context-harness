core:
  package: project-tiny-context-harness
  schema_version: "4"
profiles:
  enabled:
    - core-portable
    - workflow-default
    - composite-codex
modularity:
  limit: 300
  policy: scoped_waivers
  waivers:
    - path: packages/ty-context/src/lib/validators.ts
      category: legacy_migration
      owner: harness-maintainers
      introduced_at: "2026-07-13"
      reason: Existing combined Context and gate validator module predates the modularity gate.
      tracking_issue: modularity-backlog
      expiry_condition: Extract code modularity validation and Context manifest validation into separate validator modules.
    - path: tests/ty-context/validators.test.mjs
      category: legacy_migration
      owner: harness-maintainers
      introduced_at: "2026-07-13"
      reason: Existing combined validator regression suite predates the modularity gate.
      tracking_issue: modularity-backlog
      expiry_condition: Split Context manifest validation, code modularity validation and composite gate tests into focused files.
    - path: packages/ty-context/src/lib/sync-engine.ts
      category: legacy_migration
      owner: harness-maintainers
      introduced_at: "2026-07-13"
      reason: Existing combined managed asset sync engine predates the modularity gate; this change only narrows the sync migration preflight.
      tracking_issue: modularity-backlog
      expiry_condition: Extract managed block merging, tree syncing and Skill override safety checks into focused modules.
    - path: packages/ty-context/src/lib/composite-campaign-host-recovery.ts
      category: legacy_migration
      owner: harness-maintainers
      introduced_at: "2026-07-14"
      reason: The pre-existing aggregate host recovery state machine already exceeded function and branch thresholds; deterministic V5 turn reconciliation extends that same compatibility surface while preserving crash semantics.
      tracking_issue: modularity-backlog
      expiry_condition: Extract Goal identity recovery, authoring-turn recovery and execution-turn reconciliation into separate pure transition modules.
    - path: packages/ty-context/src/lib/composite-campaign-final-gate.ts
      category: legacy_migration
      owner: harness-maintainers
      introduced_at: "2026-07-14"
      reason: The pre-existing aggregate Campaign final gate already exceeded the modularity limit; this hotfix exposes its existing snapshot evaluator and removes the non-transactional acceptance write without expanding gate semantics.
      tracking_issue: modularity-backlog
      expiry_condition: Extract Slice result collection, global-constraint evaluation and final-result serialization into focused modules behind the snapshot evaluator.
    - path: packages/ty-context/src/lib/composite-campaign-orchestrator.ts
      category: legacy_migration
      owner: harness-maintainers
      introduced_at: "2026-07-14"
      reason: The pre-existing Campaign transition coordinator already exceeded statement, branch and state-transition thresholds; V5 gates and repair routing extend the same deterministic transition entry point.
      tracking_issue: modularity-backlog
      expiry_condition: Split authoring, wave integration, repair and finalization transitions behind a small campaign action reducer.
    - path: packages/ty-context/src/lib/composite-campaign-thread-orchestrator.ts
      category: legacy_migration
      owner: harness-maintainers
      introduced_at: "2026-07-14"
      reason: The pre-existing App Server run loop already exceeded the branch threshold; V5 reconnect and all-settled shutdown handling retain one host lifecycle boundary.
      tracking_issue: modularity-backlog
      expiry_condition: Extract action dispatch, reconnect policy and shutdown reconciliation into independent host lifecycle helpers.
    - path: tools/consumer_lab_full_test.mjs
      category: legacy_migration
      owner: harness-maintainers
      introduced_at: "2026-07-13"
      reason: Existing consumer lab orchestration script predates the modularity gate.
      tracking_issue: modularity-backlog
      expiry_condition: Extract command profile definitions and report generation helpers from the orchestration flow.
    - path: examples/delivery-benchmark/runner/delivery_benchmark.mjs
      category: legacy_migration
      owner: harness-maintainers
      introduced_at: "2026-07-13"
      reason: Rename-only surface migration touched the existing benchmark runner, which predates the modularity gate.
      tracking_issue: modularity-backlog
      expiry_condition: Split scenario loading, workspace preparation, command execution and report rendering into runner modules.
    - path: tools/external_pr_packet_check.mjs
      category: legacy_migration
      owner: harness-maintainers
      introduced_at: "2026-07-13"
      reason: Rename-only surface migration touched the existing external packet checker, which predates the modularity gate.
      tracking_issue: modularity-backlog
      expiry_condition: Extract packet discovery, diff validation and report formatting into separate helpers.
    - path: tools/launch_next_steps.mjs
      category: legacy_migration
      owner: harness-maintainers
      introduced_at: "2026-07-13"
      reason: Rename-only surface migration touched the existing launch next-step planner, which predates the modularity gate.
      tracking_issue: modularity-backlog
      expiry_condition: Split feedback ingestion, action ranking and Markdown rendering into focused modules.
    - path: tools/launch_readiness_check.mjs
      category: legacy_migration
      owner: harness-maintainers
      introduced_at: "2026-07-13"
      reason: Rename-only surface migration touched the existing launch readiness checker, which predates the modularity gate.
      tracking_issue: modularity-backlog
      expiry_condition: Extract local surface checks, external metadata checks, version checks and report rendering into separate check modules.
    - path: tools/launch_unblock_check.mjs
      category: legacy_migration
      owner: harness-maintainers
      introduced_at: "2026-07-13"
      reason: Rename-only surface migration touched the existing launch unblock checker, which predates the modularity gate.
      tracking_issue: modularity-backlog
      expiry_condition: Split npm, GitHub, docs and recommendation checks into focused modules.
    - path: tools/sync_release_version.mjs
      category: legacy_migration
      owner: harness-maintainers
      introduced_at: "2026-07-13"
      reason: Rename-only surface migration touched the existing release version synchronizer, which predates the modularity gate.
      tracking_issue: modularity-backlog
      expiry_condition: Split version source discovery, surface updates and check-mode diff reporting into focused helpers.
managed_files:
  - path: AGENTS.md
    strategy: merge-block
  - path: Makefile
    strategy: merge-block
  - path: .codex/skills
    strategy: managed
  - path: .codex/ty-context-managed/context_templates
    strategy: managed
  - path: .codex/ty-context-managed/make/ty-context.mk
    strategy: managed
  - path: tools
    strategy: managed
  - path: .github/workflows/harness.yml
    strategy: create-if-missing
never_overwrite:
  - project_context/**
  - DESIGN.md
  - src/**
  - tests/**
  - .work_products/**
  - .codex/state/**
