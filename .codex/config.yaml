core:
  package: "agent-project-sdlc"
  version: "0.1.0"
  schema_version: "1"

managed_files:
  - path: "AGENTS.md"
    strategy: "merge-block"
  - path: "Makefile"
    strategy: "merge-block"
  - path: ".codex/skills"
    strategy: "managed"
  - path: ".codex/pjsdlc_managed/templates"
    strategy: "managed"
  - path: ".codex/pjsdlc_managed/policies"
    strategy: "merge-with-local"
  - path: ".codex/pjsdlc_managed/make/sdlc-harness.mk"
    strategy: "managed"
  - path: ".github/workflows/harness.yml"
    strategy: "create-if-missing"

local_overrides:
  - ".codex/overrides/**"
  - ".codex/pjsdlc_managed/policies/*.local.yaml"

never_overwrite:
  - ".docs/**"
  - ".codex/state/**"
  - "src/**"
  - "tests/**"
