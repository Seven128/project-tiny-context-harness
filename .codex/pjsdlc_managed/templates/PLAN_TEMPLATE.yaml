tasks:
  - id: "TASK-001"
    phase: "REQUIREMENT_GATHERING"
    title: "生成示例 PRD slice"
    status: "pending"
    summary: "一句话描述任务目标和交付边界。"
    docs:
      raw:
        - ".docs/00_raw/example.md"
      product:
        - ".docs/01_product/example.md"
      architecture: []
      tech_plan: []
      rfc: []
      runbook: []
    allowed_paths:
      - ".docs/00_raw/**"
      - ".docs/01_product/**"
      - ".docs/INDEX.md"
      - "<harnessRoot>/state/plan.yaml"
    required_gates:
      - "make validate-plan"
      - "make docs-overview"
    acceptance_criteria:
      - "验收标准写在 open task 内，完成后从当前 plan 删除。"
