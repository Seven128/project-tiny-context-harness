    #       purpose: "style_target | layout_target | asset_source | inspiration_only | unknown"
    #       usage_boundary: "do_not_copy_directly | user_owned_asset | licensed_asset | unknown"
    #   screenshot_artifacts:
    #     - viewport: "desktop"
    #       path: ".artifacts/visual-spike/TASK-001/desktop.png"
    #     - viewport: "mobile"
    #       path: ".artifacts/visual-spike/TASK-001/mobile.png"
    #   comparison_required: true
    #   difference_analysis: "style / proportion / layering / subject recognition / HUD readability / responsive gaps"
    #   next_iteration_changes:
    #     - "one concrete visual change to try next"
    #   human_visual_approval_required: true
    #   approval_status: "pending | approved | changes_requested | not_applicable"
    # Required for SPRINTING tasks that deliver a service, agent, runtime,
    # worker, frontend app, provider/live integration, or other runnable boundary.
    evidence_level:
      required: "unit | local_runtime | external_provider_live | deployed_runtime | business_handoff_ready"
      supporting:
        - "unit"
    target_runtime_environment:
      kind: "local | ci | staging | cloud_vm | managed_service | browser | worker | not_applicable"
      required_for_done: true
      handoff_entrypoint: "URL / CLI / worker command / server action"
    # Required for SPRINTING tasks with a runnable boundary. Created during
    # ARCHITECTING/RFC and executed during SPRINTING.
    self_test_contract:
      status: "required | not_applicable"
      source: ".docs/03_tech_plan/example.md"
      capability_refs:
        - "PRD-EXAMPLE-001"
      runnable_entry: "command / URL / endpoint / worker command"
      observable_exit: "response / page state / side effect / log / artifact"
      module_key_test_path: "local start command / URL -> all self-test scenarios -> all task/module promised runnable entries -> internal key paths / boundaries / checkpoints -> observable completion evidence"
      # Set graph_required: true for complex/high-risk handoff paths:
      # scenario >= 3, multiple branches/entries, runtime/live/provider/browser/worker,
      # or paths that Review/Testing must consume explicitly. The graph is a
      # lightweight DAG handoff skeleton, not an execution trace, runbook, log,
      # evidence dump, or graph engine input.
      graph_required: false
      module_key_test_graph:
        nodes:
          - id: "entry-local-start"
            kind: "entry"
            label: "local start command / URL"
          - id: "checkpoint-core-path"
            kind: "checkpoint"
            label: "core module boundary or checkpoint"
          - id: "scenario-st-001"
            kind: "scenario"
            label: "ST-001 expected behavior"
            scenario_ref: "ST-001"
            expected_exit: "observable response / side effect / page state"
            evidence_ref: ".docs/09_runbooks/example_evidence.md#ST-001"
          - id: "exit-observable"
            kind: "observable_exit"
            label: "observable response / side effect / page state"
        edges:
          - from: "entry-local-start"
            to: "checkpoint-core-path"
          - from: "checkpoint-core-path"
            to: "scenario-st-001"
          - from: "scenario-st-001"
            to: "exit-observable"
      required_gates:
        - "npm run smoke"
      scenarios:
        - id: "ST-001"
          entry: "command / URL / endpoint / worker command"
          expected_exit: "observable response / side effect / page state"
          evidence: "command/browser/API/log/screenshot/etc"
      not_applicable_reason: ""
    working_notes:
      - "执行现场备注只保留恢复所需的短备注；目标 5-8 条，validator 上限 8 条；路径选择结论提升到 resume_capsule。"
    result_docs:
      - ".docs/01_product/example.md"
