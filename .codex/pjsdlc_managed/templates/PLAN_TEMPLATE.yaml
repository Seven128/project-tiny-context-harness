      architecture: []
      tech_plan: []
      rfc: []
      runbook: []
    allowed_paths:
      - ".docs/00_raw/**"
      - ".docs/01_product/**"
      - ".docs/INDEX.md"
      - "<harnessRoot>/state/plan.yaml"
    required_gates:
      - "make validate-plan"
      - "make docs-overview"
    acceptance_criteria:
      - "验收标准写在 open task 内，完成后从当前 plan 删除。"
    # Required for reference-image-driven UI/UX, art direction, game-screen,
    # HUD, character, sprite, or other subjective visual restoration work.
    # This is a task profile, not a lifecycle phase. It separates engineering
    # gates from human visual acceptance.
    # visual_reconciliation:
