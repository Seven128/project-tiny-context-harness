tasks:
  - id: "TASK-001"
    phase: "REQUIREMENT_GATHERING"
    title: "生成示例 PRD slice"
    status: "pending"
    summary: "一句话描述任务目标和交付边界。"
    docs:
      raw:
        - ".docs/00_raw/example.md"
      product:
        - ".docs/01_product/example.md"
      uiux:
        - ".docs/02_experience/example.md"
      design_system:
