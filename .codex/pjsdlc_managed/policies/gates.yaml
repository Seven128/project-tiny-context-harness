gates:
  validate-harness:
    command: "make validate-harness"
    purpose: "验证 Harness 模板、状态源、策略和 Skill 文件是否完整"
    required_for:
      - "all"

  validate-plan:
    command: "make validate-plan"
    purpose: "验证当前 open task 合同，允许任务执行中保留 open task"
    required_for:
      - "REQUIREMENT_GATHERING"
      - "ARCHITECTING"
      - "SPRINTING"
      - "REVIEWING"
      - "TESTING"
      - "RELEASING"
      - "RFC_RECALIBRATION"

  validate-pm:
    command: "make validate-pm"
    purpose: "验证 PRD、验收标准、Out of Scope 和 Open Questions"
    required_for:
      - "REQUIREMENT_GATHERING"

  validate-uiux:
    command: "make validate-uiux"
    purpose: "验证 UI/UX 体验事实源、屏幕契约、交互状态、响应式 / a11y 验收和 DESIGN.md 设计系统"
    required_for:
      - "UI_UX_DESIGNING"

  validate-design:
    command: "make validate-design"
    purpose: "验证架构设计、技术方案、任务草案和任务字段完整性"
    required_for:
      - "ARCHITECTING"

  validate-dev:
    command: "make validate-dev"
    purpose: "验证任务状态、已消费 draft、allowed_paths、代码检查、测试、实现文档和 Development Evidence"
    required_for:
      - "SPRINTING"

  validate-review:
    command: "make validate-review"
    purpose: "验证 Review 报告、风险结论和测试入口建议"
    required_for:
      - "REVIEWING"

  validate-test:
    command: "make validate-test"
    purpose: "验证 TEST_REPORT.md 执行证据、测试矩阵、回归记录、覆盖缺口和阶段边界"
    required_for:
      - "TESTING"

  validate-release:
    command: "make validate-release"
    purpose: "验证当前发布状态、Smoke Test、部署检查和回滚方案"
    required_for:
      - "RELEASING"

  validate-rfc:
    command: "make validate-rfc"
    purpose: "验证 RFC 格式、影响分析、回归要求和状态"
    required_for:
      - "RFC_RECALIBRATION"
