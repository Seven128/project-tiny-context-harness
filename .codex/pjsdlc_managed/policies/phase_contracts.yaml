phases:
  IDLE:
    goal: "等待项目启动"
    role: "manager"
    skill: "pjsdlc_manager"
    inputs:
      - "<harnessRoot>/state/lifecycle.yaml"
    outputs:
      - "<harnessRoot>/state/lifecycle.yaml"
    gates: []
    next: "REQUIREMENT_GATHERING"

  REQUIREMENT_GATHERING:
    goal: "收集需求并形成产品方案"
    role: "pm"
    skill: "pjsdlc_pm_prd"
    inputs:
      - "<harnessRoot>/state/plan.yaml"
      - ".docs/00_raw/"
    outputs:
      - "<harnessRoot>/state/plan.yaml"
      - ".docs/01_product/"
      - ".docs/INDEX.md"
    gates:
      - "make validate-pm"
    next: "ARCHITECTING"

  ARCHITECTING:
    goal: "根据产品方案生成架构设计、技术方案和任务草案"
    role: "architect"
    skill: "pjsdlc_architect_design"
    inputs:
      - "<harnessRoot>/state/plan.yaml"
      - ".docs/01_product/"
      - ".docs/02_architecture/"
    outputs:
      - "<harnessRoot>/state/plan.yaml"
      - ".docs/02_architecture/"
      - ".docs/03_tech_plan/"
      - "<harnessRoot>/state/plan.draft.yaml"
    gates:
      - "make validate-design"
    next: "SPRINTING"
    returns:
      - "REQUIREMENT_GATHERING"

  SPRINTING:
    goal: "按任务状态执行开发、消费已采用草案、开发验证和实现文档沉淀"
    role: "developer"
    skill: "pjsdlc_dev_sprint"
    inputs:
      - "<harnessRoot>/state/plan.yaml"
      - "<harnessRoot>/state/plan.draft.yaml"
      - "current open task plan contract"
      - ".docs/01_product/"
      - ".docs/03_tech_plan/"
    outputs:
      - "src/"
      - "tests/"
      - ".docs/04_implementation/"
      - "<harnessRoot>/state/plan.draft.yaml"
    gates:
      - "make validate-dev"
    next: "REVIEWING"

  REVIEWING:
    goal: "只读审查实现质量、需求一致性和架构风险"
    role: "reviewer"
    skill: "pjsdlc_reviewer"
    inputs:
      - "<harnessRoot>/state/plan.yaml"
      - ".docs/01_product/"
      - ".docs/03_tech_plan/"
      - ".docs/04_implementation/"
      - "git diff"
    outputs:
      - "<harnessRoot>/state/plan.yaml"
      - ".docs/06_review/REVIEW_REPORT.md"
    gates:
      - "make validate-review"
    next: "TESTING"

  TESTING:
    goal: "基于已交付 entry/exit 形成测试策略、测试用例、执行报告、回归证据和覆盖缺口结论"
    role: "tester"
    skill: "pjsdlc_tester"
    inputs:
      - "<harnessRoot>/state/plan.yaml"
      - ".docs/01_product/"
      - ".docs/03_tech_plan/"
      - ".docs/04_implementation/"
      - ".docs/06_review/"
    outputs:
      - "<harnessRoot>/state/plan.yaml"
      - ".docs/07_test/TEST_STRATEGY.md"
      - ".docs/07_test/TEST_CASES.md"
      - ".docs/07_test/TEST_REPORT.md"
      - "tests/"
    gates:
      - "make validate-test"
    next: "RELEASING"

  RELEASING:
    goal: "当前发布状态、发布检查和回滚方案"
    role: "release_manager"
    skill: "pjsdlc_release_manager"
    inputs:
      - "<harnessRoot>/state/plan.yaml"
      - ".docs/07_test/"
      - "build artifacts"
    outputs:
      - "<harnessRoot>/state/plan.yaml"
      - ".docs/08_release/CURRENT_RELEASE.md"
    gates:
      - "make validate-release"
    next: "COMPLETED"

  COMPLETED:
    goal: "当前里程碑已完成"
    role: "manager"
    skill: "pjsdlc_manager"
    inputs:
      - ".docs/08_release/CURRENT_RELEASE.md"
    outputs:
      - "<harnessRoot>/state/lifecycle.yaml"
    gates: []
    next: "IDLE"

  RFC_RECALIBRATION:
    goal: "处理需求变更、影响分析、测试事实源清理、局部补丁和任务回退"
    role: "rfc_owner"
    skill: "pjsdlc_rfc_recalibrate"
    inputs:
      - ".docs/rfc/"
      - ".docs/01_product/"
      - ".docs/03_tech_plan/"
      - "<harnessRoot>/state/plan.yaml"
    outputs:
      - ".docs/rfc/"
      - ".docs/07_test/"
      - "<harnessRoot>/state/plan.yaml"
      - ".docs/INDEX.md"
    gates:
      - "make validate-rfc"
    next: "SPRINTING"

  BLOCKED:
    goal: "等待人工补充信息、授权或基础设施处理"
    role: "manager"
    skill: "pjsdlc_manager"
    inputs:
      - "<harnessRoot>/state/lifecycle.yaml"
    outputs:
      - "<harnessRoot>/state/lifecycle.yaml"
    gates: []
    next: "REQUIREMENT_GATHERING"
