phases:
  IDLE:
    goal: "等待项目启动"
    role: "manager"
    skill: "pjsdlc_manager"
    inputs:
      - "<harnessRoot>/state/lifecycle.yaml"
    outputs:
      - "<harnessRoot>/state/lifecycle.yaml"
    gates: []

  REQUIREMENT_GATHERING:
    goal: "收集需求并形成产品方案"
    role: "pm"
    skill: "pjsdlc_pm_prd"
    inputs:
      - "<harnessRoot>/state/plan.yaml"
      - ".docs/00_raw/"
    outputs:
      - "<harnessRoot>/state/plan.yaml"
      - ".docs/01_product/"
      - ".docs/INDEX.md"
    gates:
      - "make validate-pm"

  UI_UX_DESIGNING:
    goal: "根据产品方案形成体验事实源、屏幕契约、交互状态和设计系统交接约束"
    role: "designer"
    skill: "pjsdlc_uiux_design"
    inputs:
      - "<harnessRoot>/state/plan.yaml"
      - ".docs/01_product/"
      - ".docs/02_experience/"
      - "DESIGN.md"
    outputs:
      - "<harnessRoot>/state/plan.yaml"
      - ".docs/02_experience/"
      - "DESIGN.md"
      - ".docs/INDEX.md"
    gates:
      - "make validate-uiux"

  ARCHITECTING:
    goal: "根据产品方案生成架构设计、技术方案和任务草案"
    role: "architect"
    skill: "pjsdlc_architect_design"
    inputs:
      - "<harnessRoot>/state/plan.yaml"
      - ".docs/01_product/"
      - ".docs/02_experience/"
      - "DESIGN.md"
      - ".docs/02_architecture/"
    outputs:
      - "<harnessRoot>/state/plan.yaml"
      - ".docs/02_architecture/"
      - ".docs/03_tech_plan/"
      - "<harnessRoot>/state/plan.draft.yaml"
    gates:
      - "make validate-design"

  SPRINTING:
    goal: "按任务状态执行开发、消费已采用草案、开发验证、Development Evidence 和实现文档沉淀"
    role: "developer"
    skill: "pjsdlc_dev_sprint"
    inputs:
      - "<harnessRoot>/state/plan.yaml"
      - "<harnessRoot>/state/plan.draft.yaml"
      - "current open task plan contract"
      - ".docs/01_product/"
      - ".docs/02_experience/"
      - ".docs/03_tech_plan/"
      - "DESIGN.md"
    outputs:
      - "src/"
      - "tests/"
      - ".docs/04_implementation/"
      - ".docs/09_runbooks/"
      - "<harnessRoot>/state/plan.draft.yaml"
    gates:
      - "make validate-dev"

  REVIEWING:
    goal: "只读审查实现质量、需求一致性和架构风险"
    role: "reviewer"
    skill: "pjsdlc_reviewer"
    inputs:
      - "<harnessRoot>/state/plan.yaml"
      - ".docs/01_product/"
      - ".docs/02_experience/"
      - ".docs/03_tech_plan/"
      - ".docs/04_implementation/"
      - "DESIGN.md"
      - "git diff"
    outputs:
      - "<harnessRoot>/state/plan.yaml"
      - ".docs/06_review/REVIEW_REPORT.md"
    gates:
      - "make validate-review"

  TESTING:
    goal: "基于已交付 entry/exit 形成测试策略、测试用例、执行报告、回归证据和覆盖缺口结论"
    role: "tester"
    skill: "pjsdlc_tester"
    inputs:
      - "<harnessRoot>/state/plan.yaml"
      - ".docs/01_product/"
      - ".docs/02_experience/"
      - ".docs/03_tech_plan/"
      - ".docs/04_implementation/"
      - ".docs/09_runbooks/"
      - ".docs/06_review/"
      - "DESIGN.md"
    outputs:
      - "<harnessRoot>/state/plan.yaml"
      - ".docs/07_test/TEST_STRATEGY.md"
      - ".docs/07_test/TEST_CASES.md"
      - ".docs/07_test/TEST_REPORT.md"
      - "tests/"
    gates:
      - "make validate-test"

  RELEASING:
    goal: "当前发布状态、发布检查和回滚方案"
    role: "release_manager"
    skill: "pjsdlc_release_manager"
    inputs:
      - "<harnessRoot>/state/plan.yaml"
      - ".docs/07_test/"
      - "build artifacts"
    outputs:
      - "<harnessRoot>/state/plan.yaml"
      - ".docs/08_release/CURRENT_RELEASE.md"
    gates:
      - "make validate-release"

  COMPLETED:
    goal: "当前里程碑已完成"
    role: "manager"
    skill: "pjsdlc_manager"
    inputs:
      - ".docs/08_release/CURRENT_RELEASE.md"
    outputs:
      - "<harnessRoot>/state/lifecycle.yaml"
    gates: []

  RFC_RECALIBRATION:
    goal: "处理需求变更、影响分析、测试事实源清理、局部补丁和任务回退"
    role: "rfc_owner"
    skill: "pjsdlc_rfc_recalibrate"
    inputs:
      - ".docs/rfc/"
      - ".docs/01_product/"
      - ".docs/02_experience/"
      - ".docs/03_tech_plan/"
      - "DESIGN.md"
      - "<harnessRoot>/state/plan.yaml"
    outputs:
      - ".docs/rfc/"
      - ".docs/07_test/"
      - ".docs/09_runbooks/"
      - "<harnessRoot>/state/plan.yaml"
      - ".docs/INDEX.md"
    gates:
      - "make validate-rfc"

  BLOCKED:
    goal: "等待人工补充信息、授权或基础设施处理"
    role: "manager"
    skill: "pjsdlc_manager"
    inputs:
      - "<harnessRoot>/state/lifecycle.yaml"
    outputs:
      - "<harnessRoot>/state/lifecycle.yaml"
    gates: []

transitions:
  - from: "IDLE"
    to: "REQUIREMENT_GATHERING"
    trigger: "advance"
    kind: "normal"
  - from: "REQUIREMENT_GATHERING"
    to: "UI_UX_DESIGNING"
    trigger: "advance"
    kind: "normal"
  - from: "UI_UX_DESIGNING"
    to: "ARCHITECTING"
    trigger: "advance"
    kind: "normal"
  - from: "ARCHITECTING"
    to: "SPRINTING"
    trigger: "advance"
    kind: "normal"
  - from: "SPRINTING"
    to: "REVIEWING"
    trigger: "advance"
    kind: "normal"
  - from: "REVIEWING"
    to: "TESTING"
    trigger: "advance"
    kind: "normal"
  - from: "TESTING"
    to: "RELEASING"
    trigger: "advance"
    kind: "normal"
  - from: "TESTING"
    to: "UI_UX_DESIGNING"
    trigger: "bugfix_uiux_replan"
    kind: "return"
  - from: "TESTING"
    to: "ARCHITECTING"
    trigger: "bugfix_replan"
    kind: "return"
  - from: "TESTING"
    to: "SPRINTING"
    trigger: "bugfix_implementation_gap"
    kind: "return"
  - from: "RELEASING"
    to: "COMPLETED"
    trigger: "advance"
    kind: "normal"
  - from: "COMPLETED"
    to: "IDLE"
    trigger: "advance"
    kind: "normal"
  - from: "ARCHITECTING"
    to: "REQUIREMENT_GATHERING"
    trigger: "return_to_prd"
    kind: "return"
  - from: "UI_UX_DESIGNING"
    to: "REQUIREMENT_GATHERING"
    trigger: "return_to_prd"
    kind: "return"
  - from: "ARCHITECTING"
    to: "UI_UX_DESIGNING"
    trigger: "return_to_uiux"
    kind: "return"
  - from: "SPRINTING"
    to: "RFC_RECALIBRATION"
    trigger: "requirement_change"
    kind: "interrupt"
    effects:
      set_suspended_phase: true
  - from: "REVIEWING"
    to: "RFC_RECALIBRATION"
    trigger: "requirement_change"
    kind: "interrupt"
    effects:
      set_suspended_phase: true
  - from: "TESTING"
    to: "RFC_RECALIBRATION"
    trigger: "requirement_change"
    kind: "interrupt"
    effects:
      set_suspended_phase: true
  - from: "RELEASING"
    to: "RFC_RECALIBRATION"
    trigger: "requirement_change"
    kind: "interrupt"
    effects:
      set_suspended_phase: true
  - from: "RFC_RECALIBRATION"
    to: "SPRINTING"
    trigger: "rfc_complete"
    kind: "resume"
    effects:
      clear_suspended_phase: true
  - from: "IDLE"
    to: "BLOCKED"
    trigger: "blocked"
    kind: "interrupt"
    effects:
      set_suspended_phase: true
  - from: "REQUIREMENT_GATHERING"
    to: "BLOCKED"
    trigger: "blocked"
    kind: "interrupt"
    effects:
      set_suspended_phase: true
  - from: "UI_UX_DESIGNING"
    to: "BLOCKED"
    trigger: "blocked"
    kind: "interrupt"
    effects:
      set_suspended_phase: true
  - from: "ARCHITECTING"
    to: "BLOCKED"
    trigger: "blocked"
    kind: "interrupt"
    effects:
      set_suspended_phase: true
  - from: "SPRINTING"
    to: "BLOCKED"
    trigger: "blocked"
    kind: "interrupt"
    effects:
      set_suspended_phase: true
  - from: "REVIEWING"
    to: "BLOCKED"
    trigger: "blocked"
    kind: "interrupt"
    effects:
      set_suspended_phase: true
  - from: "TESTING"
    to: "BLOCKED"
    trigger: "blocked"
    kind: "interrupt"
    effects:
      set_suspended_phase: true
  - from: "RELEASING"
    to: "BLOCKED"
    trigger: "blocked"
    kind: "interrupt"
    effects:
      set_suspended_phase: true
  - from: "COMPLETED"
    to: "BLOCKED"
    trigger: "blocked"
    kind: "interrupt"
    effects:
      set_suspended_phase: true
  - from: "RFC_RECALIBRATION"
    to: "BLOCKED"
    trigger: "blocked"
    kind: "interrupt"
    effects:
      set_suspended_phase: true
  - from: "BLOCKED"
    to: "<suspended_phase>"
    trigger: "resume"
    kind: "resume"
    effects:
      clear_suspended_phase: true
