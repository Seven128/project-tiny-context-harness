risk_levels:
  P0:
    label: "必须人工确认"
    examples:
      - "生产数据删除、迁移或不可逆写入"
      - "认证、授权、支付、审计、合规策略变化"
      - "跨服务接口契约破坏性变更"
      - "无法通过本地或 CI gate 复现的关键失败"
    action: "进入 BLOCKED，说明风险和所需确认"

  P1:
    label: "需要明确记录并建议人工复核"
    examples:
      - "公共 API 行为变化"
      - "核心性能路径改造"
      - "测试覆盖明显不足但业务要求继续"
      - "与既有技术方案存在偏移"
    action: "记录在实现文档、Review 报告或 RFC 中"

  P2:
    label: "Agent 可继续处理"
    examples:
      - "局部 bug 修复"
      - "文档补充"
      - "单任务范围内的测试补充"
      - "非破坏性重构"
    action: "按当前阶段 Skill 继续推进"
